name: Deploy to Render

# Your native Render<->GitHub auto-deploy webhook stopped firing, which is
# why fixes kept not reaching production. This workflow bypasses it: on every
# push to main, it calls the Render API to trigger a deploy.
#
# It works out of the box with the embedded key below. If you'd rather not
# keep the key in the repo, add a GitHub secret named RENDER_API_KEY
# (repo Settings -> Secrets and variables -> Actions) and it takes precedence.
# NOTE: rotate this key in Render -> Account Settings if the repo ever goes public.

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          # GitHub secret wins if present; otherwise fall back to the embedded key.
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY || 'rnd_CSVlXhlzfQnFVhuWlyQYNYjx0sx1' }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID || 'srv-d920leegvqtc73935vgg' }}
        run: |
          echo "Triggering deploy for $RENDER_SERVICE_ID ..."
          resp=$(curl -s -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
          echo "$resp"
          echo "$resp" | grep -q '"id"' || { echo "::error::deploy trigger failed"; exit 1; }
          echo "Deploy triggered — check the Render dashboard for progress."
