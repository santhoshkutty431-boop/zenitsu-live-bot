name: Keep-Alive (24/7 uptime)

# Render's free tier spins the service down after ~15 min with no inbound
# HTTP. The bot's own self-ping dies once it's spun down, so we ping it from
# OUTSIDE (GitHub's servers) every ~10 min to keep it awake 24/7.
#
# No setup required. Runs automatically. You can also trigger it manually
# from the Actions tab.

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping bot health endpoint
        run: |
          URL="https://zenitsu-live-bot.onrender.com/health"
          echo "Pinging $URL ..."
          # Retry a few times — a spun-down service takes ~30-60s to wake.
          for attempt in 1 2 3 4 5; do
            code=$(curl -s -o /tmp/health.json -w "%{http_code}" --max-time 90 "$URL" || echo "000")
            echo "attempt $attempt -> HTTP $code"
            if [ "$code" = "200" ]; then
              cat /tmp/health.json
              echo ""
              echo "Bot is awake."
              exit 0
            fi
            sleep 20
          done
          echo "::warning::Bot did not respond 200 after retries (it may still be waking)."
