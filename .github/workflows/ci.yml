name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check all JS files
        run: |
          find . -name "*.js" \
            -not -path "./node_modules/*" \
            -not -path "./scripts/*" \
            -not -path "./data/*" \
            -not -path "./logs/*" \
            -print0 | xargs -0 -n1 node --check

      - name: Lint
        run: npm run lint
